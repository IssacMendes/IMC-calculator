<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/reset.css" />
    <link rel="stylesheet" href="./css/responsive.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
    <title>Calculadora de IMC</title>
  </head>
  <body>
    <div class="image">
      <img
        src="./image/ChatGPT Image 10 de mar. de 2026, 12_34_50.png"
        alt="casal fitness"
      />
    </div>
    <section class="main">
      <div class="principal">
        <div class="info">
          <h1>Calculadora - IMC</h1>
        </div>
        <div class="input-peso">
          <p>Peso em Kg</p>
          <span class="unidade">Kg</span>
          <input type="number" id="peso" placeholder="50" />
        </div>

        <div class="input-altura">
          <p>Altura em metros</p>
          <span class="altura">m</span>
          <input type="number" id="altura" placeholder="1,55" />
        </div>

        <div class="btn">
          <button onclick="calcularIMC()">
            <p>Calcular</p>
          </button>
        </div>
        <div class="resultado">
          <p id="mensagem-imc">Seu IMC aparecerá aqui</p>
          <h2 id="valor-imc">--</h2>
        </div> 
        <div class="function">
        </div>
      </div>
    </section>
    <script src="./scirpt.js"></script>
  </body>
</html>
